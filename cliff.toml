# git-cliff configuration for OmniContext
# Generates CHANGELOG.md from conventional commits.
# Docs: https://git-cliff.org/docs/configuration
#
# Usage:
#   git-cliff --output CHANGELOG.md          # Full changelog
#   git-cliff --latest --output CHANGELOG.md # Only latest release section
#   git-cliff --unreleased --tag v0.9.0      # Unreleased → 0.9.0 section

[changelog]
# Header appears at the top of CHANGELOG.md once
header = """
# Changelog

All notable changes to OmniContext are documented here.  
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).  
Versioning follows [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Per-release body template (Tera syntax)
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}\
{% if commit.breaking %} **[BREAKING]**{% endif %} \
([{{ commit.id | truncate(length=7, end="") }}](https://github.com/steeltroops-ai/omnicontext/commit/{{ commit.id }}))
{% endfor %}\
{% endfor %}\n
"""

# Footer at the very bottom of CHANGELOG.md
footer = """
<!-- generated by git-cliff -->
"""

# Strip whitespace from commit messages before templating
trim = true

# Do not overwrite existing CHANGELOG.md — prepend to it
postprocessors = []

[git]
# Only include commits that match conventional commit format
conventional_commits = true

# When true, commits that don't match conventional format are ignored
filter_unconventional = true

# Pre-process commit message  
commit_preprocessors = [
  # Strip trailing dot from subject line
  { pattern = '\\.$', replace = "" },
  # Strip [skip ci] tag
  { pattern = ' \\[skip ci\\]', replace = "" },
  # Strip [skip cd] tag
  { pattern = ' \\[skip cd\\]', replace = "" },
]

# Map conventional commit types to human-readable changelog groups
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Reverted" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^ci", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(dist\\)", skip = true },
  { message = "^chore", skip = true },
  { message = "^build", skip = true },
  { message = "^Merge", skip = true },
]

# Protect breaking changes — surface them even when their type is skipped
protect_breaking_commits = true

# Filter out commits that have been skipped by parsers above
filter_commits = true

# Use git tags as version boundaries. Tag pattern = vX.Y.Z
tag_pattern = "v[0-9].*"

# Skip commits whose tag matches this (e.g., RC tags)
skip_tags = "v.*-alpha|v.*-beta|v.*-rc"

# Do not include tags that match this
ignore_tags = ""

# Use most recent tag before the current tag as the "previous release" anchor
topo_order = false

# Sort commits newest-first within each group
sort_commits = "newest"
