ShortDescription: Universal code context engine for AI coding agents
Description: >-
  OmniContext is a local-first semantic code context engine that provides deep
  code intelligence to AI coding agents via the Model Context Protocol (MCP).
  It indexes source code with tree-sitter AST parsing, semantic chunking, and
  local ONNX-based vector embeddings — no cloud APIs required.
