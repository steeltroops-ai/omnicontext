name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_bump:
        description: "Force version bump (major, minor, patch, or auto)"
        required: false
        default: "auto"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Analyze commits and determine if we should release
  analyze:
    name: Analyze Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      bump_type: ${{ steps.check.outputs.bump_type }}
      new_version: ${{ steps.version.outputs.new_version }}
      last_tag: ${{ steps.versions.outputs.last_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get versions
        id: versions
        run: |
          current=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "current=$current" >> $GITHUB_OUTPUT
          echo "last_tag=$last_tag" >> $GITHUB_OUTPUT

      - name: Analyze commits
        id: check
        run: |
          # Get commits since last tag
          if [ "${{ steps.versions.outputs.last_tag }}" = "v0.0.0" ]; then
            commits=$(git log --pretty=format:"%s" HEAD)
          else
            commits=$(git log --pretty=format:"%s" ${{ steps.versions.outputs.last_tag }}..HEAD)
          fi

          # Check for conventional commits
          has_breaking=false
          has_feat=false
          has_fix=false

          while IFS= read -r commit; do
            if echo "$commit" | grep -qiE '^[a-z]+(\([a-zA-Z0-9_,-]+\))?!:|BREAKING CHANGE:'; then
              has_breaking=true
            elif echo "$commit" | grep -qiE '^feat(\([a-zA-Z0-9_,-]+\))?:'; then
              has_feat=true
            elif echo "$commit" | grep -qiE '^fix(\([a-zA-Z0-9_,-]+\))?:'; then
              has_fix=true
            fi
          done <<< "$commits"

          # Determine bump type
          bump_type="none"
          if [ "$has_breaking" = true ]; then
            bump_type="major"
          elif [ "$has_feat" = true ]; then
            bump_type="minor"
          elif [ "$has_fix" = true ]; then
            bump_type="patch"
          fi

          # Override with manual input
          if [ "${{ github.event.inputs.force_bump }}" != "" ] && [ "${{ github.event.inputs.force_bump }}" != "auto" ]; then
            bump_type="${{ github.event.inputs.force_bump }}"
          fi

          should_release="false"
          if [ "$bump_type" != "none" ]; then
            should_release="true"
          fi

          echo "bump_type=$bump_type" >> $GITHUB_OUTPUT
          echo "should_release=$should_release" >> $GITHUB_OUTPUT
          echo "Bump type: $bump_type"
          echo "Should release: $should_release"

      - name: Calculate new version
        id: version
        if: steps.check.outputs.should_release == 'true'
        run: |
          current="${{ steps.versions.outputs.current }}"
          bump_type="${{ steps.check.outputs.bump_type }}"

          # Handle direct version string (e.g., 1.1.0)
          if [[ "$bump_type" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            new_version="$bump_type"
          else
            IFS='.' read -r major minor patch <<< "$current"
            case $bump_type in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
              *) echo "Error: Unknown bump type $bump_type"; exit 1 ;;
            esac
            new_version="${major}.${minor}.${patch}"
          fi

          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version: $new_version"

  # Step 2: Bump version and create release
  bump-and-tag:
    name: Bump Version and Tag
    needs: analyze
    if: needs.analyze.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      version: ${{ needs.analyze.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Update version files
        run: |
          new_version="${{ needs.analyze.outputs.new_version }}"

          # Update all Cargo.toml files using cargo-edit (safe workspace bump)
          cargo install cargo-edit --locked --quiet
          cargo set-version --workspace "${new_version}"

          # Update package.json
          if [ -f editors/vscode/package.json ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"${new_version}\"/" editors/vscode/package.json
          fi

          cargo update --workspace --quiet

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-2.7.0/git-cliff /usr/local/bin/
          git-cliff --version

      - name: Generate changelog
        run: |
          new_version="${{ needs.analyze.outputs.new_version }}"
          last_tag="${{ needs.analyze.outputs.last_tag }}"
          
          # Generate full changelog entry for this release
          if [ -z "$last_tag" ] || [ "$last_tag" = "v0.0.0" ]; then
            git-cliff --unreleased --tag "v${new_version}" --strip all > /tmp/changelog.md
          else
            git-cliff "${last_tag}..HEAD" --tag "v${new_version}" --strip all > /tmp/changelog.md
          fi
          
          # Generate VS Code-specific changelog
          if [ -z "$last_tag" ] || [ "$last_tag" = "v0.0.0" ]; then
            commits=$(git log --pretty=format:"%s|%h" HEAD -- editors/vscode/)
          else
            commits=$(git log --pretty=format:"%s|%h" "${last_tag}..HEAD" -- editors/vscode/)
          fi
          
          # Build VS Code changelog with Keep a Changelog format
          {
            echo "### Added"
            echo ""
            while IFS='|' read -r msg hash; do
              [ -z "$msg" ] && continue
              echo "$msg" | grep -qi '\[skip ci\]' && continue
              if echo "$msg" | grep -qE '^feat(\([^)]*\))?:'; then
                clean=$(echo "$msg" | sed -E 's/^feat(\([^)]+\))?:[[:space:]]*//')
                echo "- ${clean} ([${hash}](https://github.com/steeltroops-ai/omnicontext/commit/${hash}))"
              fi
            done <<< "$commits"
            echo ""
            echo "### Fixed"
            echo ""
            while IFS='|' read -r msg hash; do
              [ -z "$msg" ] && continue
              echo "$msg" | grep -qi '\[skip ci\]' && continue
              if echo "$msg" | grep -qE '^fix(\([^)]*\))?:'; then
                clean=$(echo "$msg" | sed -E 's/^fix(\([^)]+\))?:[[:space:]]*//')
                echo "- ${clean} ([${hash}](https://github.com/steeltroops-ai/omnicontext/commit/${hash}))"
              fi
            done <<< "$commits"
            echo ""
            echo "### Changed"
            echo ""
            while IFS='|' read -r msg hash; do
              [ -z "$msg" ] && continue
              echo "$msg" | grep -qi '\[skip ci\]' && continue
              if echo "$msg" | grep -qE '^(refactor|perf|docs|style|test)(\([^)]*\))?:'; then
                clean=$(echo "$msg" | sed -E 's/^[a-z]+(\([^)]+\))?:[[:space:]]*//')
                echo "- ${clean} ([${hash}](https://github.com/steeltroops-ai/omnicontext/commit/${hash}))"
              fi
            done <<< "$commits"
          } > /tmp/vscode_changelog.md
          
          # Clean up empty sections
          sed -i '/^### [A-Za-z]*$/N;/\n$/d' /tmp/vscode_changelog.md
          
          # If no changes, add placeholder
          if [ ! -s /tmp/vscode_changelog.md ] || [ "$(wc -l < /tmp/vscode_changelog.md)" -lt 3 ]; then
            echo "_No direct changes in this release._" > /tmp/vscode_changelog.md
          fi
          
          echo "--- Generated global changelog ---"
          cat /tmp/changelog.md
          echo "--- Generated VS Code changelog ---"
          cat /tmp/vscode_changelog.md

      - name: Update CHANGELOG.md
        run: |
          new_version="${{ needs.analyze.outputs.new_version }}"
          
          # Use git-cliff to regenerate the entire CHANGELOG.md with the new release
          git-cliff --tag "v${new_version}" --output CHANGELOG.md
          
          # Update VS Code extension CHANGELOG.md
          vscode_cl="editors/vscode/CHANGELOG.md"
          date=$(date +%Y-%m-%d)
          
          if [ ! -f "$vscode_cl" ]; then
            echo "# Changelog" > "$vscode_cl"
            echo "" >> "$vscode_cl"
            echo "All notable changes to the OmniContext VS Code extension are documented here." >> "$vscode_cl"
            echo "" >> "$vscode_cl"
          fi
          
          # Prepend new version section to VS Code changelog
          {
            head -n 3 "$vscode_cl"
            echo ""
            echo "## [${new_version}] - ${date}"
            echo ""
            cat /tmp/vscode_changelog.md
            echo ""
            tail -n +4 "$vscode_cl"
          } > "${vscode_cl}.tmp"
          mv "${vscode_cl}.tmp" "$vscode_cl"

      - name: Commit and push
        run: |
          new_version="${{ needs.analyze.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock crates/*/Cargo.toml editors/vscode/package.json CHANGELOG.md editors/vscode/CHANGELOG.md
          git commit -m "chore(release): bump version to ${new_version} [skip ci]"
          git tag -a "v${new_version}" -m "Release v${new_version}"

          git push origin main
          git push origin "v${new_version}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.analyze.outputs.new_version }}
          name: omni v${{ needs.analyze.outputs.new_version }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 3: Build binaries for all platforms
  build:
    name: Build ${{ matrix.target }}
    needs: [analyze, bump-and-tag]
    if: needs.analyze.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write # for provenance
      attestations: write # for SLSA attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-and-tag.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --workspace --bins

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ needs.bump-and-tag.outputs.version }}"
          $target = "${{ matrix.target }}"
          $archive = "omnicontext-${version}-${target}.zip"

          New-Item -ItemType Directory -Path staging -Force
          Copy-Item "target/${{ matrix.target }}/release/omnicontext.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release/omnicontext-mcp.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release/omnicontext-daemon.exe" staging/

          # Bundle ONNX Runtime and any other required DLLs
          # Ort with copy-dylibs should put it in the release folder. 
          # We check there first, then fallback to a recursive search in target.
          $releaseDir = "target/${{ matrix.target }}/release"
          if (Test-Path "$releaseDir/*.dll") {
              Copy-Item "$releaseDir/*.dll" staging/ -ErrorAction SilentlyContinue
          } else {
              Get-ChildItem -Path "target" -Filter "*.dll" -Recurse | Copy-Item -Destination staging/ -ErrorAction SilentlyContinue
          }

          Copy-Item README.md, LICENSE staging/

          Compress-Archive -Path staging/* -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash
          "$hash  $archive" | Out-File -FilePath "${archive}.sha256" -Encoding ASCII

          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          version="${{ needs.bump-and-tag.outputs.version }}"
          target="${{ matrix.target }}"
          archive="omnicontext-${version}-${target}.tar.gz"

          mkdir -p staging
          cp "target/${{ matrix.target }}/release/omnicontext" staging/
          cp "target/${{ matrix.target }}/release/omnicontext-mcp" staging/
          cp "target/${{ matrix.target }}/release/omnicontext-daemon" staging/ || true
          cp "target/${{ matrix.target }}/release/"libonnxruntime* staging/ 2>/dev/null || true
          cp README.md LICENSE staging/

          tar -czf "$archive" -C staging .

          if [[ "$OSTYPE" == "darwin"* ]]; then
            shasum -a 256 "$archive" > "${archive}.sha256"
          else
            sha256sum "$archive" > "${archive}.sha256"
          fi

          echo "ARCHIVE=$archive" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.bump-and-tag.outputs.version }}
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.ARCHIVE }}

  # Step 4: Smoke test binaries before publishing
  smoke-test:
    name: Smoke Test ${{ matrix.target }}
    needs: [analyze, bump-and-tag, build]
    if: needs.analyze.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: omnicontext.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: omnicontext
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: omnicontext
    steps:
      - name: Download release artifact
        run: |
          version="${{ needs.bump-and-tag.outputs.version }}"
          target="${{ matrix.target }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ext="zip"
          else
            ext="tar.gz"
          fi
          archive="omnicontext-${version}-${target}.${ext}"
          url="https://github.com/${{ github.repository }}/releases/download/v${version}/${archive}"
          
          curl -sSL -f "$url" -o "$archive"
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            unzip "$archive"
          else
            tar -xzf "$archive"
          fi
        shell: bash

      - name: Test binary execution
        run: |
          ./${{ matrix.binary }} --version
          ./${{ matrix.binary }} --help
        shell: bash

  # Step 5: Publish VS Code Extension
  publish-extension:
    name: Publish VS Code Extension
    needs: [analyze, bump-and-tag, build, smoke-test]
    if: needs.analyze.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-and-tag.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: editors/vscode
        run: bun install

      - name: Compile
        working-directory: editors/vscode
        run: bun run compile

      - name: Publish to Marketplace
        working-directory: editors/vscode
        if: github.repository == 'steeltroops-ai/omnicontext'
        continue-on-error: true
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }} --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        working-directory: editors/vscode
        if: github.repository == 'steeltroops-ai/omnicontext'
        continue-on-error: true
        run: npx ovsx publish -p ${{ secrets.OVSX_PAT }} --no-dependencies
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # Step 6: Update package manager manifests with real SHA256 hashes
  update-manifests:
    name: Update Package Manifests
    needs: [analyze, bump-and-tag, build, smoke-test]
    if: needs.analyze.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SHA256 files
        run: |
          version="${{ needs.bump-and-tag.outputs.version }}"
          base_url="https://github.com/steeltroops-ai/omnicontext/releases/download/v${version}"

          mkdir -p /tmp/shas
          for target in x86_64-pc-windows-msvc x86_64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            if [ "$target" = "x86_64-pc-windows-msvc" ]; then
              ext="zip"
            else
              ext="tar.gz"
            fi
            sha_file="omnicontext-${version}-${target}.${ext}.sha256"
            curl -sSL -f "${base_url}/${sha_file}" -o "/tmp/shas/${target}.sha256" || echo "PLACEHOLDER_SHA256" > "/tmp/shas/${target}.sha256"
          done

      - name: Update Homebrew formula
        run: |
          version="${{ needs.bump-and-tag.outputs.version }}"

          sha_arm64=$(cut -d' ' -f1 /tmp/shas/aarch64-apple-darwin.sha256)
          sha_x64=$(cut -d' ' -f1 /tmp/shas/x86_64-apple-darwin.sha256)
          sha_linux=$(cut -d' ' -f1 /tmp/shas/x86_64-unknown-linux-gnu.sha256)

          cat > distribution/homebrew/omnicontext.rb << FORMULA_EOF
          class Omnicontext < Formula
            desc "Universal code context engine for AI coding agents"
            homepage "https://github.com/steeltroops-ai/omnicontext"
            version "${version}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/steeltroops-ai/omnicontext/releases/download/v#{version}/omnicontext-#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_arm64}"
              else
                url "https://github.com/steeltroops-ai/omnicontext/releases/download/v#{version}/omnicontext-#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_x64}"
              end
            end

            on_linux do
              url "https://github.com/steeltroops-ai/omnicontext/releases/download/v#{version}/omnicontext-#{version}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${sha_linux}"
            end

            # Pre-built binary — no compilation needed
            bottle :unneeded

            def install
              bin.install "omnicontext"
              bin.install "omnicontext-mcp"
              bin.install "omnicontext-daemon" if File.exist?("omnicontext-daemon")
            end

            def post_install
              # Auto-configure MCP for all detected AI clients
              system "#{bin}/omnicontext", "setup", "--all" rescue nil
            end

            def caveats
              <<~EOS
                To configure OmniContext for all your AI coding clients, run:
                  omnicontext setup --all

                Quick start:
                  cd /path/to/your/project
                  omnicontext index .
                  omnicontext search "your query"
              EOS
            end

            test do
              assert_match "omnicontext", shell_output("#{bin}/omnicontext --version")
            end
          end
          FORMULA_EOF

          # Fix indentation (heredoc artifact)
          sed -i 's/^          //' distribution/homebrew/omnicontext.rb

      - name: Update Scoop manifest
        run: |
          version="${{ needs.bump-and-tag.outputs.version }}"
          sha_win=$(cut -d' ' -f1 /tmp/shas/x86_64-pc-windows-msvc.sha256)

          cat > distribution/scoop/omnicontext.json << SCOOP_EOF
          {
            "version": "${version}",
            "description": "Universal code context engine for AI coding agents",
            "homepage": "https://github.com/steeltroops-ai/omnicontext",
            "license": "Apache-2.0",
            "architecture": {
              "64bit": {
                "url": "https://github.com/steeltroops-ai/omnicontext/releases/download/v${version}/omnicontext-${version}-x86_64-pc-windows-msvc.zip",
                "hash": "${sha_win}"
              }
            },
            "bin": ["omnicontext.exe", "omnicontext-mcp.exe", "omnicontext-daemon.exe"],
            "post_install": "& \"\$dir\\\\omnicontext.exe\" setup --all 2>\$null",
            "checkver": {
              "github": "https://github.com/steeltroops-ai/omnicontext"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/steeltroops-ai/omnicontext/releases/download/v\$version/omnicontext-\$version-x86_64-pc-windows-msvc.zip"
                }
              },
              "hash": {
                "url": "\$url.sha256"
              }
            },
            "notes": "Run 'omnicontext setup --all' to configure MCP for all AI coding clients."
          }
          SCOOP_EOF

          sed -i 's/^          //' distribution/scoop/omnicontext.json

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add distribution/homebrew/omnicontext.rb distribution/scoop/omnicontext.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore(dist): update package manifests for v${{ needs.bump-and-tag.outputs.version }} [skip ci]"
            git push origin main
          fi
