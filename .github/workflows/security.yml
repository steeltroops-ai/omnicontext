name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 02:00 UTC — catch new advisories against pinned deps
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # job: audit
  # Scans Cargo.lock against the RustSec advisory database.
  # Needs checks:write to post results as a PR check annotation.
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # required by rustsec/audit-check to post annotations
    steps:
      - uses: actions/checkout@v4

      - name: Security audit
        uses: rustsec/audit-check@v2.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        # Note: unmaintained/unsound crates produce warnings, not hard failures.
        # Add specific RUSTSEC IDs to deny.toml [advisories].ignore only when
        # you have reviewed the issue and accepted the risk with a written reason.

  # ---------------------------------------------------------------------------
  # job: supply-chain
  # cargo-deny v2: checks licenses, bans, advisories, and sources.
  # deny.toml must use valid v2 values: "allow" | "warn" | "deny"
  # ---------------------------------------------------------------------------
  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          # deny.toml controls severity -- see cliff.toml comment for tuning

  # ---------------------------------------------------------------------------
  # job: node-audit
  # Audit JavaScript/TypeScript dependencies (npm/bun).
  # ---------------------------------------------------------------------------
  node-audit:
    name: Node Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Audit dependencies
        working-directory: editors/vscode
        run: |
          if ! bun audit; then
            echo "::error::Node.js supply chain audit failed. Review vulnerability list and fix or add and document exception."
            # exit 1 
            # Note: For now, we manually exit if we want it to be a hard fail. 
            # bun audit exit code 0 if all clean or --allow might be needed.
            # We'll use the exit code directly.
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # job: codeql
  # Static analysis for Rust and TypeScript/JavaScript.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: "javascript, rust"
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # ---------------------------------------------------------------------------
  # job: security-gate
  # Acts as the required status check for branch protection.
  # PR cannot merge unless both audit + supply-chain pass.
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [audit, supply-chain, codeql, node-audit]
    if: always()
    steps:
      - name: Evaluate security jobs
        run: |
          supply="${{ needs.supply-chain.result }}"
          codeql="${{ needs.codeql.result }}"
          node_audit="${{ needs.node-audit.result }}"

          echo "audit:        $audit"
          echo "supply-chain: $supply"
          echo "codeql:       $codeql"
          echo "node-audit:   $node_audit"

          # supply-chain (cargo-deny) is the authoritative gate.
          # It respects deny.toml [advisories].ignore for accepted risks.
          if [[ "$supply" != "success" ]]; then
            echo "::error::Supply chain check failed. Fix deny.toml or add an ignore entry with a documented reason."
            exit 1
          fi

          if [[ "$codeql" != "success" ]]; then
            echo "::error::CodeQL static analysis failed. Review Security tab for findings."
            exit 1
          fi

          if [[ "$node_audit" != "success" ]]; then
             echo "::error::Node.js dependency audit failed."
             exit 1
          fi

          # audit-check surfaces all advisories including unmaintained/unsound.
          # These are already triaged via deny.toml ignore list in the supply-chain job.
          # Treat audit failures as informational warnings, not blockers.
          if [[ "$audit" == "failure" ]]; then
            echo "::warning::Security audit flagged advisories. Review the audit job logs. Accepted risks are tracked in deny.toml."
          fi

          echo "Security gate passed."
