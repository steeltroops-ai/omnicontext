name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 02:00 UTC — catch new advisories against pinned deps
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # job: audit
  # Scans Cargo.lock against the RustSec advisory database.
  # Needs checks:write to post results as a PR check annotation.
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # required by rustsec/audit-check to post annotations
    steps:
      - uses: actions/checkout@v4

      - name: Security audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        # Note: unmaintained/unsound crates produce warnings, not hard failures.
        # Add specific RUSTSEC IDs to deny.toml [advisories].ignore only when
        # you have reviewed the issue and accepted the risk with a written reason.

  # ---------------------------------------------------------------------------
  # job: supply-chain
  # cargo-deny v2: checks licenses, bans, advisories, and sources.
  # deny.toml must use valid v2 values: "allow" | "warn" | "deny"
  # ---------------------------------------------------------------------------
  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          # deny.toml controls severity -- see cliff.toml comment for tuning

  # ---------------------------------------------------------------------------
  # job: codeql
  # Static analysis for Rust and TypeScript/JavaScript.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "javascript, rust"
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------------
  # job: security-gate
  # Acts as the required status check for branch protection.
  # PR cannot merge unless both audit + supply-chain pass.
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [audit, supply-chain]
    if: always()
    steps:
      - name: Evaluate security jobs
        run: |
          audit="${{ needs.audit.result }}"
          supply="${{ needs.supply-chain.result }}"

          echo "audit:        $audit"
          echo "supply-chain: $supply"

          # supply-chain must be green — license/ban violations are blocking
          if [[ "$supply" != "success" ]]; then
            echo "::error::Supply chain check failed. Fix deny.toml or add an ignore entry with a documented reason."
            exit 1
          fi

          # audit warns on unmaintained crates but only hard-fails on vulnerabilities
          # The rustsec/audit-check action exits non-zero on real CVEs
          if [[ "$audit" == "failure" ]]; then
            echo "::error::Security audit failed. A RUSTSEC vulnerability was found. Check the audit job logs."
            exit 1
          fi

          echo "Security gate passed."
