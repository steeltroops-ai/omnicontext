name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 02:00 UTC — catch new advisories against pinned deps
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # job: audit
  # Scans Cargo.lock against the RustSec advisory database.
  # Accepted risks are documented in deny.toml [advisories].ignore
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write # required by rustsec/audit-check to post annotations
    steps:
      - uses: actions/checkout@v4

      - name: Security audit
        uses: rustsec/audit-check@v2.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        # rustsec/audit-check does not respect deny.toml [advisories].ignore.
        # It is used for annotation only. cargo-deny (supply-chain job) is the
        # authoritative advisory gate; it respects all accepted risks in deny.toml.

  # ---------------------------------------------------------------------------
  # job: supply-chain
  # cargo-deny v2: checks licenses, bans, advisories, and sources.
  # deny.toml must use valid v2 values: "allow" | "warn" | "deny"
  # ---------------------------------------------------------------------------
  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          # deny.toml controls severity -- see cliff.toml comment for tuning

  # ---------------------------------------------------------------------------
  # job: node-audit
  # Audit JavaScript/TypeScript dependencies (npm/bun).
  # Advisory-only: @vscode/vsce bundles transitive deps (undici, yauzl) with
  # known advisories that have not been patched upstream yet. These are
  # build-time packaging tools — they are not included in the shipped VSIX
  # extension bundle and do not affect end-users. Tracked for visibility,
  # but the supply-chain (cargo-deny) job is the authoritative security gate.
  # ---------------------------------------------------------------------------
  node-audit:
    name: Node Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Audit dependencies (advisory)
        working-directory: editors/vscode
        run: |
          # Run audit for visibility; failure is non-blocking (continue-on-error: true).
          # Vulnerabilities in @vscode/vsce transitive deps are build-tool-only and
          # not present in the shipped extension. Track in Security tab for awareness.
          bun audit || true

  # ---------------------------------------------------------------------------
  # job: codeql
  # Static analysis for Rust and TypeScript/JavaScript.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: "javascript, rust"
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # ---------------------------------------------------------------------------
  # job: dependency-review
  # Reviews dependency changes in PRs for security and license issues.
  # Only runs on pull requests to catch issues before merge.
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-blocking: requires GitHub Dependency Graph enabled in repo settings.
    # Supply-chain (cargo-deny) is the authoritative dependency gate.
    continue-on-error: true
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  # ---------------------------------------------------------------------------
  # job: sbom
  # Generate Software Bill of Materials for supply chain transparency.
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Rust SBOM
        run: |
          cargo install cargo-sbom || true
          cargo sbom > sbom-rust.json || echo '{"error": "cargo-sbom not available"}' > sbom-rust.json
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Generate Node SBOM
        working-directory: editors/vscode
        run: |
          bun install
          npx @cyclonedx/cyclonedx-npm --output-file ../../sbom-node.json || echo '{"error": "sbom generation failed"}' > ../../sbom-node.json
      
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-rust.json
            sbom-node.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # job: security-gate
  # Acts as the required status check for branch protection.
  # PR cannot merge unless both audit + supply-chain pass.
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [audit, supply-chain, codeql, node-audit]
    if: always()
    steps:
      - name: Evaluate security jobs
        run: |
          audit="${{ needs.audit.result }}"
          supply="${{ needs.supply-chain.result }}"
          codeql="${{ needs.codeql.result }}"
          node_audit="${{ needs.node-audit.result }}"

          echo "audit:        $audit"
          echo "supply-chain: $supply"
          echo "codeql:       $codeql"
          echo "node-audit:   $node_audit"

          # supply-chain (cargo-deny) is the authoritative gate.
          # It respects deny.toml [advisories].ignore for accepted risks.
          if [[ "$supply" != "success" ]]; then
            echo "::error::Supply chain check failed. Fix deny.toml or add an ignore entry with a documented reason."
            exit 1
          fi

          if [[ "$codeql" != "success" ]]; then
            echo "::error::CodeQL static analysis failed. Review Security tab for findings."
            exit 1
          fi

          # node-audit runs with continue-on-error: true because @vscode/vsce
          # bundles transitive deps (undici, yauzl) with known advisories that
          # are build-tool-only and not present in the shipped extension bundle.
          # Log for visibility but do not block the gate.
          if [[ "$node_audit" != "success" ]]; then
            echo "::warning::Node.js dependency audit reported advisories (build-tool transitive deps only). Review Security tab."
          fi

          # audit-check uses continue-on-error because it does not respect deny.toml.
          # supply-chain (cargo-deny) is the authoritative gate for accepted risks.
          # We log audit failures here for visibility but do not block on them.
          if [[ "$audit" != "success" ]]; then
            echo "::warning::rustsec/audit-check reported advisories. Review annotations and ensure all accepted risks are documented in deny.toml."
          fi

          echo "Security gate passed."
