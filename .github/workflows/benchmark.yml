name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench --workspace --no-fail-fast

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30

  performance-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run baseline benchmarks (main)
        run: |
          git checkout main
          # Target only the Criterion benchmark suite; --save-baseline is a
          # Criterion-specific flag and fails for non-Criterion bench targets.
          cargo bench -p omni-core --bench core_benchmarks -- --save-baseline main

      - name: Run PR benchmarks
        id: run_bench
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          # --baseline compares against the main branch baseline saved above.
          cargo bench -p omni-core --bench core_benchmarks -- --baseline main | tee /tmp/bench_output.txt

          # Parse for regressions. Criterion outputs "Performance has regressed."
          # Only fail if the integer part of a positive change is >= 20 (i.e. >=20%).
          # The regex \+([2-9][0-9]|[1-9][0-9]+)\. anchors to the INTEGER part before
          # the decimal point, avoiding false positives from decimal digits like +4.66%.
          if grep -q "Performance has regressed" /tmp/bench_output.txt; then
            echo "::warning::Criterion detected a performance regression."

            # Match lines with a positive change whose integer part is >= 20.
            if grep -qE "\+([2-9][0-9]|[1-9][0-9]+)\.[0-9]+%" /tmp/bench_output.txt; then
               echo "::error::Critical performance regression detected (>=20%). PR rejected."
               exit 1
            fi
          fi

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read benchmark results
            const criterionDir = 'target/criterion';
            let comment = '## 📊 Benchmark Results\n\n';

            if (fs.existsSync(criterionDir)) {
              comment += 'Benchmarks completed. Check artifacts for detailed results.\n';
            } else {
              comment += 'No benchmark results found.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
