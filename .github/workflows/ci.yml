name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # -D warnings: all warnings are errors in CI -- no silent regressions
  RUSTFLAGS: "-D warnings"
  # Skip heavy model downloads in automated test environments
  OMNI_SKIP_MODEL_DOWNLOAD: "1"

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # job: check
  # Fast type-check pass on every platform. Catches missing features, wrong
  # target APIs, and import errors before spending time on compilation.
  # ---------------------------------------------------------------------------
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check (workspace, all targets)
        run: cargo check --workspace --all-targets

  # ---------------------------------------------------------------------------
  # job: fmt
  # Fails immediately if code is not formatted — cheap and fast.
  # Must pass before test/clippy waste runner time.
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: |
          if ! cargo fmt --all -- --check; then
            echo "::error::Formatting check failed. Run 'cargo fmt --all' locally and commit the result."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # job: clippy
  # Lint the library and binary crates separately.
  # Tests are excluded here — the dead-code lint in -D warnings would fire on
  # test-only structs that exist solely for JSON deserialization (serde).
  # Those structs carry #[allow(dead_code)] in source instead.
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy — binary crates
        run: cargo clippy -p omni-mcp -p omni-daemon -p omni-cli --bins -- -D warnings

      - name: Clippy — core library (lib only, not test targets)
        # --lib explicitly excludes integration test files from -D warnings
        # Integration/benchmark tests use #[allow(dead_code)] where needed
        run: cargo clippy -p omni-core --lib -- -D warnings

  # ---------------------------------------------------------------------------
  # job: test
  # Full test suite on all three supported platforms.
  # Benchmark tests are marked #[ignore] and excluded from normal runs.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [check, fmt] # don't waste matrix runners on unformatted code
    strategy:
      fail-fast: false # always run all platforms to surface OS-specific failures
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Run tests (excluding ignored benchmarks)
        # --lib --bins --tests covers unit + integration tests
        # Does NOT run #[ignore] benchmark tests that need a live indexed repo
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # job: deny
  # cargo-deny supply-chain check inline in CI (in addition to security.yml).
  # Catches license and ban violations on every PR, not just on a schedule.
  # ---------------------------------------------------------------------------
  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ---------------------------------------------------------------------------
  # job: ci-success
  # Required status check for branch protection rules.
  # ALL jobs above must pass. PRs are blocked until this is green.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [check, fmt, clippy, test, deny]
    if: always()
    steps:
      - name: Evaluate all jobs
        run: |
          results=(
            "check:${{ needs.check.result }}"
            "fmt:${{ needs.fmt.result }}"
            "clippy:${{ needs.clippy.result }}"
            "test:${{ needs.test.result }}"
            "deny:${{ needs.deny.result }}"
          )

          failed=0
          for entry in "${results[@]}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error::Job '$name' did not succeed (result: $result)"
              failed=1
            fi
          done

          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "One or more required CI jobs failed. Fix all issues locally before pushing:"
            echo "  cargo fmt --all"
            echo "  cargo clippy -p omni-core --lib -- -D warnings"
            echo "  cargo clippy -p omni-mcp -p omni-daemon -p omni-cli --bins -- -D warnings"
            echo "  cargo test --workspace"
            exit 1
          fi

          echo "All CI checks passed."
